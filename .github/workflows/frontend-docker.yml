# Pipeline per il solo frontend: la root del repository GitHub deve essere questa cartella
# (repo dedicato al FE). GitHub legge i workflow solo da .github/workflows/ rispetto alla root del repo.

name: Frontend — build & Docker

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/prenota-salute-fe

jobs:
  build:
    name: Build Angular
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

  docker-push:
    name: Build & push immagine Docker
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
