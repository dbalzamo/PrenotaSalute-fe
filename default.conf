# Configurazione nginx per l'app Angular in produzione.
# Il backend deve essere raggiungibile dal nome host indicato (es. servizio Docker Compose "backend").

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss;

    # API Spring: stesso path usato in environment.apiUrl e nel proxy di sviluppo
    location /prenotazione-medica/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
